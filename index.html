<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recipe Tracker</title>
  <link rel="stylesheet" href="css/style.css?v=47">
</head>
<body>
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p id="loading-text">Loading...</p>
  </div>

  <div id="toast" class="hidden"></div>

  <header id="app-header">
    <div class="header-left">
      <button id="btn-back" class="icon-btn hidden" onclick="App.goBack()">&#8592;</button>
      <h1 id="header-title">My Recipes</h1>
      <span id="app-version" class="app-version"></span>
    </div>
    <div class="header-right" id="header-right"></div>
  </header>

  <main id="app-main"></main>

  <div id="modal-settings" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Settings</h2>
      <div class="form-group">
        <label for="setting-pat">GitHub Personal Access Token</label>
        <input type="password" id="setting-pat" placeholder="ghp_..." autocomplete="new-password">
        <small>Needs <code>repo</code> scope &mdash; <a href="https://github.com/settings/tokens/new?scopes=repo&description=Recipe+Tracker" target="_blank" rel="noopener">create one here</a></small>
      </div>
      <div class="form-group">
        <label for="setting-claude">Claude API Key</label>
        <input type="password" id="setting-claude" placeholder="sk-ant-..." autocomplete="new-password">
        <small>Used for AI import features (text &amp; image)</small>
      </div>
      <div class="form-group">
        <label for="setting-owner">GitHub Username</label>
        <input type="text" id="setting-owner" placeholder="ssajami">
      </div>
      <div class="form-group">
        <label for="setting-repo">GitHub Repo Name</label>
        <input type="text" id="setting-repo" placeholder="recipe-tracker">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="App.saveSettings()">Save</button>
        <button class="btn-secondary" onclick="App.hideSettings()">Cancel</button>
      </div>
      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border)">
      <button class="btn-secondary" style="width:100%" onclick="App.backupRecipes()">&#8659; Download Backup</button>
      <label class="btn-secondary" style="width:100%;display:block;text-align:center;cursor:pointer;margin-top:8px">
        &#8657; Restore from Backup
        <input type="file" accept=".json" style="display:none" onchange="App.restoreFromBackup(this)">
      </label>
    </div>
  </div>

  <div id="modal-confirm" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button class="btn-danger" id="confirm-ok">Delete</button>
        <button class="btn-secondary" onclick="App.hideConfirm()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="modal-conflict" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Page Out of Date</h2>
      <p style="margin:12px 0">Another tab or device saved changes after this page was loaded. Saving now will overwrite those changes.</p>
      <div class="modal-actions">
        <button class="btn-primary" onclick="location.reload()">Reload Page</button>
        <button class="btn-secondary" onclick="App.resolveConflict(false)">Cancel</button>
      </div>
      <button class="btn-danger" style="width:100%;margin-top:8px" onclick="App.resolveConflict(true)">Save Anyway</button>
    </div>
  </div>

  <script src="js/storage.js?v=47"></script>
  <script src="js/ai.js?v=47"></script>
  <script src="js/app.js?v=47"></script>
</body>
</html>
